<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produkte | Billigt Filament</title>
    <link rel="stylesheet" href="Assets/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-grid">
            <a href="index.html" class="logo">BILLIGT<span>FILAMENT</span></a>
            
            <button class="hamburger" id="hamburger" aria-label="Menü">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="main-nav" id="main-nav">
                <a href="index.html">Startseite</a>
                <a href="products.html" class="active">Produkte</a>
                <a href="about.html">Über uns</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 60px 0;">
        <h1 style="font-size: 2.8rem; margin-bottom: 40px; letter-spacing: -2px;">Unser Sortiment</h1>

        <div class="filters-wrapper">
            <div class="filter-row">
                <div class="filter-group"> 
                    <label class="filter-label">Im Katalog suchen</label>
                    <input type="text" id="searchField" class="search-input" placeholder="Hier suchen...">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Sortieren nach</label>
                    <select id="sortOrder" class="sort-select">
                        <option value="default">Relevanz</option>
                        <option value="low">Preis: Niedrig → Hoch</option>
                        <option value="high">Preis: Hoch → Niedrig</option>
                    </select>
                </div>
            </div>

            <div class="material-selection">
                <label class="filter-label">Kategorie / Material wählen</label>
                <div class="material-boxes" id="materialBoxes">
                    <button class="material-btn active" data-cat="all">Alle</button>
                    <button class="material-btn" data-cat="PRINTER">3D Drucker</button>
                </div>
            </div>
        </div>

        <div id="productGrid" class="product-grid"></div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Billigt Filament ApS. Qualitätsmaterialien für 3D-Druck.</p>
        </div>
    </footer>
    
    <script src="Assets/script.js"></script>
</body>
</html>
